/*
In Mapbox GL JS, there is no dedicated "rectangle" layer type. Instead, you represent a rectangle as a **polygon** (using GeoJSON) and render it with a `fill` layer.

Here's how to do it:

**1. Add a GeoJSON source with your rectangle coordinates**

A rectangle is just a polygon with 4 corner coordinates (plus the first repeated to close the ring):

```js
map.on('load', () => {
  map.addSource('my-rectangle', {
    type: 'geojson',
    data: {
      type: 'Feature',
      geometry: {
        type: 'Polygon',
        coordinates: [[
          [-74.01, 40.70],  // bottom-left
          [-73.97, 40.70],  // bottom-right
          [-73.97, 40.73],  // top-right
          [-74.01, 40.73],  // top-left
          [-74.01, 40.70]   // close the ring
        ]]
      }
    }
  });

  // Add a fill layer to render the rectangle
  map.addLayer({
    id: 'my-rectangle-fill',
    type: 'fill',
    source: 'my-rectangle',
    paint: {
      'fill-color': '#0080ff',
      'fill-opacity': 0.5
    }
  });

  // Optionally, add a line layer for the border
  map.addLayer({
    id: 'my-rectangle-outline',
    type: 'line',
    source: 'my-rectangle',
    paint: {
      'line-color': '#000',
      'line-width': 2
    }
  });
});
```

**Key points:**

- Use a **`fill` layer** to render the filled polygon (your rectangle). [[Fill layer docs](https://docs.mapbox.com/mapbox-gl-js/guides/styles/work-with-layers/#layer-types)]
- Optionally add a **`line` layer** on the same source to draw the border. [[Polygon example](https://docs.mapbox.com/mapbox-gl-js/example/geojson-polygon/)]
- Always add layers inside the `map.on('load', ...)` callback to ensure the style is ready before adding layers. [[Key concepts](https://docs.mapbox.com/mapbox-gl-js/guides/#layers)]
- Use `layout` and `paint` properties to customize appearance (color, opacity, etc.). [[Layout & paint](https://docs.mapbox.com/mapbox-gl-js/guides/#layout-and-paint-properties)]
*/
function rect_geojson(lonInt,latInt){
    var lonWest=lonInt;
    var lonEast=lonInt+1;
    var latSouth=latInt;
    var latNorth=latInt+1;
    return {
        type: 'Feature',
        geometry: {
            type: 'Polygon',
            coordinates: [[
                [lonWest, latSouth],  // bottom-left
                [lonEast, latSouth],  // bottom-right
                [lonEast, latNorth],  // top-right
                [lonWest, latNorth],  // top-left
                [lonWest, latSouth]   // close the ring
            ]]
        }
    };
}

function fe_main(){
    //Mapbox参考：https://docs.mapbox.com/mapbox-gl-js/guides/
    mapboxgl.setRTLTextPlugin(
        'https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-rtl-text/v0.3.0/mapbox-gl-rtl-text.js',
        null,
        true // Lazy load the plugin
    );

    window.map = new mapboxgl.Map({
        accessToken: get_query("mapboxAccessToken","pk.eyJ1IjoibHhmbHkyMDAwIiwiYSI6ImNtNjlkb2k1OTA5aGgyaXNkeTRtbTFpMTMifQ.aISHpciwWgFtyC1ibIR5Jg"),
        container: 'map',
        style: get_query("mapboxStyle","mapbox://styles/lxfly2000/clgijkcjz006x01pk870j2uxo"), // Use the standard style for the map
        projection: mapProjection.value, // display the map as a globe
        zoom: 1, // initial zoom level, 0 is the world view, higher values zoom in
        center: [106.4, 29.8] // center the map on this longitude and latitude
    });

    map.addControl(new mapboxgl.NavigationControl());
    //map.scrollZoom.disable();

    map.on('style.load', () => {
        map.setFog({}); // Set the default atmosphere style
    });

    // 4. 获取DOM元素
    const lngElement = document.getElementById('lng');
    const latElement = document.getElementById('lat');
    const regionNameElement = document.getElementById('region_name');
    // 5. 监听鼠标移动事件，实时更新经纬度
    map.on('mousemove', (e) => {
        // 获取鼠标指向的经纬度
        const longitude = e.lngLat.lng.toFixed(2);
        const latitude = e.lngLat.lat.toFixed(2);
        
        // 更新页面显示
        lngElement.textContent = longitude;
        latElement.textContent = latitude;
        if(regionData){
            regionNameElement.textContent = get_regionName(latitude,longitude);
        }
    });

    // 6. 鼠标离开地图时重置显示
    map.on('mouseleave', () => {
        lngElement.textContent = '--';
        latElement.textContent = '--';
    });

    map.on('load', () => {
        for(var y=-90;y<90;y++){
            for(var x=-180;x<180;x++){
                map.addSource('my-rectangle', {
                    type: 'geojson',
                    data: rect_geojson(x,y)
                });
            }
        }

        // Add a fill layer to render the rectangle
        map.addLayer({
            id: 'my-rectangle-fill',
            type: 'fill',
            source: 'my-rectangle',
            paint: {
                'fill-color': '#0080ff',
                'fill-opacity': 0.5
            }
        });
    });
}

fe_main();
    </script>
