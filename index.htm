<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<title>区域名称编辑器</title>
	<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
	<link href="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.css" rel="stylesheet">
	<script src="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.js"></script>
	<style>
body {
	margin: 0;
	padding: 0;
}

/* 顶部经纬度显示栏 */
.FloatBox {
	position: fixed;
	z-index: 999; /* 确保在地图最上方 */
	pointer-events: none;
}

.Row > div {
	display: inline-block;
}

.FillBox {
	background: rgba(255, 255, 255, 0.6);
	font-size: 16px;
	font-weight: 500;
	padding: 5px 10px;
	pointer-events: all;
	vertical-align: top;
}

.Topleft {
	top: 10px;
	left: 10px;
}

.Topright {
	top: 10px;
	right: 50px;
}

.Bottomleft {
	bottom: 10px;
	left: 10px;
}

/* 经纬度数值高亮 */
.coord {
	color: #0066ff;
	font-weight: bold;
	margin: 0 8px;
	width: 60px;
	display: inline-block;
	font-family: monospace;
}

#map {
	position: absolute;
	top: 0;
	bottom: 0;
	width: 100%;
}

@media (min-width: 600px){
	.DynRowCol>div{
		display: inline-block;
	}
	.DynHeight{
		height: 100%;
	}
}
@media (max-width: 600px){
	.Topright{
		right: -10px;
	}
	.DynHeight{
		height: 150px;
	}
	.mapboxgl-control-container{
		display: none;
	}
}
	</style>
</head>

<body>
	<!-- 顶部经纬度显示区域 -->
	<div class="FloatBox Topleft Row">
		<div class="FillBox Column">
			<div class="Row">
				<button onclick="srcFile.click()">打开</button>
				<button onclick="save_regionName()">保存</button>
				<button onclick="showHelp()">帮助</button>
				<input type="file" id="srcFile" accept="application/json,*" onchange="open_regionName()" style="display: none;">
				<a id="saveLink" style="display: none;"></a>
			</div>
			<div class="Row">
				经度：<div class="coord" id="lng">--</div>
			</div>
			<div class="Row">
				纬度：<div class="coord" id="lat">--</div>
			</div>
			<div class="Row" style="width: 150px;background-color: white;">
				<div id="region_name">地名</div>
			</div>
			<noscript>本页面需要打开JavaScript才能正常运行。</noscript>
		</div>
	</div>
	<div class="FloatBox Topright DynRowCol" style="bottom: 50px;">
		<div class="FillBox Column">
			<div class="Row">
				投影：
				<select id="mapProjection" onchange="onProjectionChange()">
					<option value="globe" selected>球体</option>
					<option value="equirectangular">等距圆柱</option>
					<option value="mercator">墨卡托</option>
				</select>
			</div>
			<div class="Row">
				<input type="checkbox" id="showEditLayer" onchange="onCheckShowEditLayer()" checked><label for="showEditLayer">显示编辑层</label>
			</div>
			<div class="Row">
				<input type="checkbox" id="showPointingRegion" onchange="onCheckShowPointingRegion()" checked><label for="showPointingRegion">显示指向区域</label>
			</div>
		</div>
		<div id="collapseBox" class="FillBox Column DynHeight">
			<div style="height: 100%;display: flex;flex-direction: column;">
				<div class="Row">
					<input id="inputSearch" placeholder="输入名称…" oninput="onSearchChange(inputSearch.value)" style="width: 200px;"/>
				</div>
				<div class="Row">
					<button onclick="onAddName()">添加</button>
					<button onclick="onRemoveName()">删除</button>
					<button onclick="onModifyName()">重命名</button>
					<input type="checkbox" id="checkSearchName" onchange="onCheckSearchName()"><label for="checkSearchName">查找</label>
				</div>
				<div class="Row" style="flex-grow: 1;">
					<!--设置size≥2以列表显示-->
					<select id="regionNameList" onchange="onRegionNameListChange()" size="2" style="width: 200px;height: 100%;"></select>
				</div>
				<table><tbody><tr>
					<td><button id="buttonCollapseNameList" onclick="onCollapseNameList()">收起</button></td>
					<td align="right"><button onclick="onClearNameList()">清空</button></td>
				</tr></tbody></table>
			</div>
		</div>
	</div>
	<div id="map"></div>
	<script>
var regionData=null;//{table:[[...],...],name:["Name1",...]}

function showHelp(){
	alert("左键拖动，中键选择，右键填充");
}

function open_regionName() {
	/**@type {FileList}*/var inputFile=document.getElementById("srcFile").files;
	if(inputFile.length==0){
		return;
	}
	const fileReader=new FileReader();
	fileReader.readAsText(inputFile[0]);
	fileReader.onload=()=>{loadRegionFile(fileReader.result);};
}

function onCollapseNameList(){
	if(collapseBox.className.indexOf("DynHeight")===-1){
		collapseBox.className=collapseBox.className+" DynHeight";
		buttonCollapseNameList.textContent="收起";
	}else{
		collapseBox.className=collapseBox.className.replace("DynHeight","").trim();
		buttonCollapseNameList.textContent="展开";
	}
}

function onClearNameList(){
	if(confirm("这会清空所有数据，是否继续？")){
		regionData.name=["未定义"];
		filterNameList("");
	}
}

function loadRegionFile(str){
	try{
		const json=JSON.parse(str);
		if(check_regionName_valid(json)){
			regionData=json;
			var opts="";
			for(var i=0;i<regionData.name.length;i++){
				opts+="<option value='"+regionData.name[i]+"'>"+regionData.name[i]+"</option>";
			}
			regionNameList.innerHTML=opts;
			return;
		}
	}catch(e){}
	alert("无法读取该文件。");
}

function save_regionName() {
	if(!regionData){
		return;
	}
	const data=new Blob([JSON.stringify(regionData)], {type:"application/json"});
	const url=URL.createObjectURL(data);
	saveLink.href=url;
	saveLink.download="regions.json";
	saveLink.click();
}

function _normLongitude(lon){
	var nlon=lon%360;
	if(nlon>180){
		nlon-=360;
	}else if(nlon<-180){
		nlon+=360;
	}
	return nlon;
}

function get_regionName(lat,lon){
	try{
		return regionData.name[regionData.table[Math.floor(lat)+90][Math.floor(_normLongitude(lon))+180]];
	}catch(e){
		//console.error("获取区域名称出错："+e.message);
	}
	return "";
}

function check_regionName_valid(json_data){
	try{
		for(var y=0;y<180;y++){
			for(var x=0;x<360;x++){
				if(typeof json_data.name[json_data.table[y][x]] !== "string"){
					return false;
				}
			}
		}
		return true;
	}catch(e){
		console.log("检查文件出错："+e.message);
	}
	return false;
}

function get_query(param, defaultVal) {
	const searchParams = new URLSearchParams(window.location.search);
	const value = searchParams.get(param);
	return value || defaultVal;
}

function onProjectionChange(){
	map.setProjection(mapProjection.value);
}

function onCheckSearchName(){
	filterNameList(checkSearchName.checked?inputSearch.value:"");
	for(var i=0;i<regionNameList.childNodes.length;i++){
		if(regionNameList.childNodes[i].value.indexOf(inputSearch.value)!==-1){
			regionNameList.value=regionNameList.childNodes[i].value;
			break;
		}
	}
}

function onCheckShowEditLayer(){
	map.setLayoutProperty("regionFill","visibility",showEditLayer.checked?"visible":"none");
}

function onCheckShowPointingRegion(){
	if(!showPointingRegion.checked){
		showRegionOnMap(findNameIndex(regionNameList.value));
	}
}

function onSearchChange(s){
	if(checkSearchName.checked){
		filterNameList(s);
		for(var i=0;i<regionNameList.childNodes.length;i++){
			if(regionNameList.childNodes[i].value.indexOf(s)!==-1){
				regionNameList.value=regionNameList.childNodes[i].value;
				showRegionOnMap(findNameIndex(s));
				break;
			}
		}
	}
}

function filterNameList(s){
	var opts="";
	for(var i=0;i<regionData.name.length;i++){
		if(regionData.name[i].indexOf(s)!==-1){
			opts+="<option value='"+regionData.name[i]+"'>"+regionData.name[i]+"</option>";
		}
	}
	regionNameList.innerHTML=opts;
}

function findNameIndex(s){
	return regionData.name.indexOf(s);
}

function onRegionNameListChange(){
	var index=findNameIndex(regionNameList.value);
	inputSearch.value=regionData.name[index];
	showRegionOnMap(index);
}

function onAddName(){
	if(checkSearchName.checked){
		checkSearchName.click();
	}
	if(inputSearch.value.length===0){
		return;
	}
	if(findNameIndex(inputSearch.value)!==-1){
		alert("已存在该名称。");
		return;
	}
	regionNameList.innerHTML+="<option value='"+inputSearch.value+"'>"+inputSearch.value+"</option>";
	regionData.name.push(inputSearch.value);
	regionNameList.value=inputSearch.value;
}

function onRemoveName(){
	if(checkSearchName.checked){
		checkSearchName.click();
	}
	var index=findNameIndex(regionNameList.value);
	if(index<0||index>=regionData.name.length){
		return;
	}
	regionData.name.splice(index,1);
	regionNameList.removeChild(regionNameList.childNodes[index]);
	index=Math.min(Math.max(0,index),regionData.name.length-1);
	if(index<0||index>=regionData.name.length){
		return;
	}
	regionNameList.value=regionData.name[index];
	inputSearch.value=regionData.name[index];
}

function onModifyName(){
	if(checkSearchName.checked){
		checkSearchName.click();
	}
	if(inputSearch.value.length===0){
		return;
	}
	if(findNameIndex(inputSearch.value)!==-1){
		alert("已存在该名称。");
		return;
	}
	var index=findNameIndex(regionNameList.value);
	if(index<0||index>=regionData.name.length){
		return;
	}
	regionData.name[index]=inputSearch.value;
	regionNameList.childNodes[index].value=inputSearch.value;
	regionNameList.childNodes[index].textContent=inputSearch.value;
}

function rect_geojson(lonInt,latInt){
	var lonWest=lonInt;
	var lonEast=lonInt+1;
	var latSouth=latInt;
	var latNorth=latInt+1;
	return [[
		[lonWest, latSouth],  // bottom-left
		[lonEast, latSouth],  // bottom-right
		[lonEast, latNorth],  // top-right
		[lonWest, latNorth]   // top-left
	]];
}

function rect_closed_geojson(lonInt,latInt){
	var lonWest=lonInt;
	var lonEast=lonInt+1;
	var latSouth=latInt;
	var latNorth=latInt+1;
	return [[
		[lonWest, latSouth],  // bottom-left
		[lonEast, latSouth],  // bottom-right
		[lonEast, latNorth],  // top-right
		[lonWest, latNorth],  // top-left
		[lonWest, latSouth]
	]];
}

//[[lonInt,latInt],[lonInt,latInt],...]
function region_geojson(coordList){
	var rectList=[];
	for(var i=0;i<coordList.length;i++){
		rectList.push(rect_geojson(coordList[i][0],coordList[i][1]));
	}
	return {
		type: "Feature",
		geometry:{
			type:"MultiPolygon",
			coordinates:rectList
		}
	};
}

function region_box_geojson(coord){
	return {
		type: "Feature",
		geometry:{
			type:"Polygon",
			coordinates:rect_closed_geojson(coord[0],coord[1])
		}
	};
}

function showRegionOnMap(nameIndex){
	var coordList=[];
	for(var y=-90;y<90;y++){
		for(var x=-180;x<180;x++){
			if(regionData.table[y+90][x+180]===nameIndex){
				coordList.push([x,y]);
			}
		}
	}
	map.getSource("regionSource").setData(region_geojson(coordList));
}

function str_xor(a,key){
	var s="";
	for(var i=0;i<a.length;i++){
		s+=String.fromCharCode(a.charCodeAt(i)^key.charCodeAt(i%key.length));
	}
	return s;
}

var lastPointRegionName=null;
var lastPointingCoord=[0,0];//lon,lat

function fe_main(){
	//Mapbox参考：https://docs.mapbox.com/mapbox-gl-js/guides/
	mapboxgl.setRTLTextPlugin(
		'https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-rtl-text/v0.3.0/mapbox-gl-rtl-text.js',
		null,
		true // Lazy load the plugin
	);

	window.map = new mapboxgl.Map({
		accessToken: get_query("mapboxAccessToken",str_xor(')>v+ \x1Fi\x073:1,\x11=5,\x11>!\x03\x1D\x14/\x070"1\x17\n\x1Cn\x074\x1B,-\r1"\x17\x0E"!\x00\x1D\x14!*3\x18!-\x01\x18l\x147\x1F.+\x1D96\x01\x1E:1(\b{u\x1A\x03e /\x1F\x00=\x117l\n\x18j$\x15-\ba\x0F\x1F',"YUXN")),
		container: 'map',
		style: get_query("mapboxStyle","mapbox://styles/lxfly2000/clgijkcjz006x01pk870j2uxo"), // Use the standard style for the map
		projection: mapProjection.value, // display the map as a globe
		zoom: 1, // initial zoom level, 0 is the world view, higher values zoom in
		center: [106.4, 29.8], // center the map on this longitude and latitude
		dragRotate: false
	});

	map.addControl(new mapboxgl.NavigationControl());
	//map.scrollZoom.disable();

	map.on('style.load', () => {
		map.setFog({}); // Set the default atmosphere style
	});

	// 4. 获取DOM元素
	const lngElement = document.getElementById('lng');
	const latElement = document.getElementById('lat');
	const regionNameElement = document.getElementById('region_name');
	const mouseCallback=(e)=>{
		// 获取鼠标指向的经纬度
		const longitude = e.lngLat.lng.toFixed(2);
		const latitude = e.lngLat.lat.toFixed(2);
		
		// 更新页面显示
		lngElement.textContent = longitude;
		latElement.textContent = latitude;
		if(regionData){
			var n=get_regionName(latitude,longitude);
			regionNameElement.textContent = n;
			if(showPointingRegion.checked&&lastPointRegionName!==n){
				lastPointRegionName=n;
				showRegionOnMap(findNameIndex(n));
			}
			if(e.originalEvent.button===1){
				regionNameList.value=n;
				onRegionNameListChange();
			}
		}
		const lonInt=Math.floor(longitude);
		const latInt=Math.floor(latitude);
		if(lonInt!==lastPointingCoord[0]||latInt!==lastPointingCoord[1]){
			lastPointingCoord=[lonInt,latInt];
			map.getSource("pointingSource").setData(region_box_geojson(lastPointingCoord));
		}
	}
	// 5. 监听鼠标移动事件，实时更新经纬度
	map.on('mousemove', mouseCallback);
	map.on('mousedown', mouseCallback);

	// 6. 鼠标离开地图时重置显示
	map.on('mouseleave', () => {
		lngElement.textContent = '--';
		latElement.textContent = '--';
	});

	map.on('load', () => {
		map.addSource("regionSource",{
			type:"geojson",
			data:region_geojson([])
		});
		map.addSource("pointingSource",{
			type:"geojson",
			data:region_geojson([])
		});
		map.addLayer({
			id: 'regionFill',
			type: 'fill',
			source: 'regionSource',
			paint: {
				'fill-color': '#0080ff',
				'fill-opacity': 0.5
			},
			visibility: 'visible'
		});
		map.addLayer({
			id: 'regionPointing',
			type: 'line',
			source: 'pointingSource',
			paint: {
				'line-color': '#ffc020',
				'line-width': 2,
				'line-opacity': 0.8
			},
			visibility: 'visible'
		});
	});

	//加载自带数据
	var xhr=new XMLHttpRequest();
	xhr.open("GET","regions.json",true);
	xhr.onreadystatechange=function(){
		if(xhr.readyState===4&&xhr.status===200){//服务器正确响应
			loadRegionFile(xhr.responseText);
		}
	}
	//发送请求
	xhr.send();
}

fe_main();
	</script>

</body>

</html>
